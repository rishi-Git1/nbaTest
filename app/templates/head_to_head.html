<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NBA Team Head-to-Head</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main>
      <div class="top-row">
        <h1>NBA Team Head-to-Head</h1>
        <a class="nav-button" href="/">BACK TO PLAYERS</a>
      </div>
      <p>Compare two teams and view team-level + player-level per-game stats.</p>

      <form id="h2h-controls">
        <label>
          SEASON
          <input id="season" name="season" value="{{ default_season }}" />
        </label>

        <label>
          TEAM 1
          <select id="team1_id" name="team1_id" required>
            {% for team in teams %}
            <option value="{{ team.id }}">{{ team.full_name.upper() }} ({{ team.abbreviation }})</option>
            {% endfor %}
          </select>
        </label>

        <label>
          TEAM 2
          <select id="team2_id" name="team2_id" required>
            {% for team in teams %}
            <option value="{{ team.id }}" {% if loop.index == 2 %}selected{% endif %}>{{ team.full_name.upper() }} ({{ team.abbreviation }})</option>
            {% endfor %}
          </select>
        </label>

        <button type="submit">COMPARE</button>
      </form>

      <p id="h2h-status">Select teams to compare.</p>

      <section class="comparison-grid" id="comparison-grid"></section>
    </main>

    <script src="/static/head_to_head.js"></script>
  </body>
</html>
