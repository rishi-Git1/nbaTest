<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NBA Active Player Stats</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main>
      <div class="top-row">
        <h1>NBA Active Player Stats</h1>
        <a class="nav-button" href="/head-to-head">TEAM HEAD-TO-HEAD</a>
      </div>
      <p>Sortable stats for active players powered by <code>nba_api</code>.</p>

      <form id="controls">
        <label>
          SEASON
          <input id="season" name="season" value="{{ default_season }}" />
        </label>

        <label>
          SORT BY
          <select id="sort_by" name="sort_by"></select>
        </label>

        <label>
          ORDER
          <select id="order" name="order">
            <option value="desc" selected>DESCENDING</option>
            <option value="asc">ASCENDING</option>
          </select>
        </label>

        <button type="submit">LOAD</button>
        <button type="button" id="advanced-toggle">ADVANCED STATISTICS: OFF</button>
      </form>

      <p id="status">Loading...</p>

      <div class="table-wrap">
        <table id="results">
          <thead>
            <tr id="results-header-row"></tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
