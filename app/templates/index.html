<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NBA Active Player Stats</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main>
      <div class="top-row">
        <h1>NBA Active Player Stats</h1>
        <a class="nav-button" href="/head-to-head">TEAM HEAD-TO-HEAD</a>
      </div>
      <p>Sortable stats for active players powered by <code>nba_api</code>.</p>

      <form id="controls">
        <label>
          SEASON
          <input id="season" name="season" value="{{ default_season }}" />
        </label>

        <label>
          SORT BY
          <select id="sort_by" name="sort_by">
            {% for option in sort_options %}
            <option value="{{ option.key }}" {% if option.key == 'ppg' %}selected{% endif %}>{{ option.label }}</option>
            {% endfor %}
          </select>
        </label>

        <label>
          ORDER
          <select id="order" name="order">
            <option value="desc" selected>DESCENDING</option>
            <option value="asc">ASCENDING</option>
          </select>
        </label>

        <button type="submit">LOAD</button>
      </form>

      <p id="status">Loading...</p>

      <div class="table-wrap">
        <table id="results">
          <thead>
            <tr>
              <th>PLAYER</th>
              <th>TEAM</th>
              <th>GP</th>
              <th>PPG</th>
              <th>RPG</th>
              <th>APG</th>
              <th>SPG</th>
              <th>BPG</th>
              <th>+/-</th>
              <th>FG%</th>
              <th>TS%</th>
              <th>FT%</th>
              <th>3P%</th>
              <th>FOULS/G</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
